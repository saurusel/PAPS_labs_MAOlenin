server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  # проксируем API в контейнер сервера
  location /api/ {
    proxy_pass http://server:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

# health/docs тоже удобно проксировать (чтобы заходить через 8080 без CORS/портов)
location = /health {
  proxy_pass http://server:8000/health;
  proxy_set_header Host $host;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
}

location /docs {
  proxy_pass http://server:8000/docs;
  proxy_set_header Host $host;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
}

location = /openapi.json {
  proxy_pass http://server:8000/openapi.json;
  proxy_set_header Host $host;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
}

location /redoc {
  proxy_pass http://server:8000/redoc;
  proxy_set_header Host $host;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
}

}
